title: Password-Protected Archive Creation with 7-Zip
id: f6a2d9c3-8e57-4b10-a461-2d7f5c9e3b82
status: experimental
description: Detects 7-Zip creating an archive with password protection, which may indicate staged data collection before exfiltration.
author: Batuhan Tekin
date: 2026-07-15
references:
  - https://attack.mitre.org/techniques/T1560/001/
  - https://github.com/BatuhanTekin95/Detection-Engineering/blob/main/doc/05%20-%20Sigma%20Hunt%20Lab%20-%20Creating%20Detection%20Rules%20from%20IOCs.md
logsource:
  category: process_creation
  product: windows
detection:
  selection_image:
    Image|endswith:
      - '\7z.exe'
      - '\7za.exe'
      - '\7zz.exe'
  selection_command:
    CommandLine|contains|all:
      - ' a '
      - ' -p'
  condition: selection_image and selection_command
falsepositives:
  - Legitimate encrypted backups or approved data transfer workflows
level: medium
tags:
  - attack.collection
  - attack.t1560.001
