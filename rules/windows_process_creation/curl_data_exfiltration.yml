title: Suspicious Data Transfer with cURL
id: b8d4e1f6-3a75-4c29-9e10-5f2b7d6a8c43
status: experimental
description: Detects curl.exe using options that submit data to a remote destination, which may indicate command-line data exfiltration.
author: Batuhan Tekin
date: 2026-07-15
references:
  - https://attack.mitre.org/techniques/T1041/
  - https://github.com/BatuhanTekin95/Detection-Engineering/blob/main/doc/05%20-%20Sigma%20Hunt%20Lab%20-%20Creating%20Detection%20Rules%20from%20IOCs.md
logsource:
  category: process_creation
  product: windows
detection:
  selection_image:
    Image|endswith: '\curl.exe'
  selection_data:
    CommandLine|contains:
      - ' -d '
      - ' --data '
      - ' --data-binary '
      - ' --data-raw '
  selection_remote:
    CommandLine|contains:
      - 'http://'
      - 'https://'
  condition: selection_image and selection_data and selection_remote
falsepositives:
  - Legitimate API calls, application testing, or administrative automation
level: medium
tags:
  - attack.exfiltration
  - attack.t1041
