title: Suspicious File Download with Certutil
id: 2bf8b1da-f5b7-4d7a-8f95-11ff397768a2
status: experimental
description: Detects certutil.exe executed with command-line options commonly used to download and write a remote file.
author: Batuhan Tekin
date: 2026-07-15
references:
  - https://attack.mitre.org/techniques/T1105/
logsource:
  category: process_creation
  product: windows
detection:
  selection_image:
    Image|endswith: '\certutil.exe'
  selection_flags:
    CommandLine|contains|all:
      - '-urlcache'
      - '-split'
      - '-f'
  condition: selection_image and selection_flags
falsepositives:
  - Administrative certificate operations or software deployment workflows using the same command-line options
level: high
tags:
  - attack.command-and-control
  - attack.t1105
