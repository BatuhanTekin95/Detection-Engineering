name: Validate Sigma rules

on:
  push:
    paths:
      - 'rules/**/*.yml'
      - 'rules/**/*.yaml'
      - 'scripts/validate_sigma_rules.py'
      - '.github/workflows/validate-sigma.yml'
  pull_request:
    paths:
      - 'rules/**/*.yml'
      - 'rules/**/*.yaml'
      - 'scripts/validate_sigma_rules.py'
      - '.github/workflows/validate-sigma.yml'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install validator dependency
        run: python -m pip install --disable-pip-version-check PyYAML

      - name: Validate Sigma rules
        run: python scripts/validate_sigma_rules.py
