name: Validate Sigma rules

on:
  push:
    paths:
      - 'rules/**/*.yml'
      - 'rules/**/*.yaml'
      - 'tests/**/*.yml'
      - 'tests/**/*.yaml'
      - 'scripts/validate_sigma_rules.py'
      - '.github/workflows/validate-sigma.yml'
  pull_request:
    paths:
      - 'rules/**/*.yml'
      - 'rules/**/*.yaml'
      - 'tests/**/*.yml'
      - 'tests/**/*.yaml'
      - 'scripts/validate_sigma_rules.py'
      - '.github/workflows/validate-sigma.yml'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.12'

      - name: Install pinned validation tools
        run: python -m pip install --disable-pip-version-check PyYAML==6.0.3 sigma-cli==3.1.0

      - name: Validate metadata and example coverage
        run: python scripts/validate_sigma_rules.py

      - name: Validate against the official Sigma JSON schema
        uses: SigmaHQ/sigma-rules-validator@v1.0.0
        with:
          paths: './rules'

      - name: Install the Splunk conversion backend
        run: sigma plugin install splunk

      - name: Convert all rules to Splunk queries
        run: sigma convert -t splunk rules > /tmp/sigma-splunk-queries.txt
